<!-- @template name="Consuming Project Template" description="Starter template for projects using the Vanilla Tailwind Design System" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Using Vanilla Tailwind Design System</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--muted); }
  .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  .lead { font-size: 14px; color: var(--muted-foreground); margin: -12px 0 0; }
  code { font-family: var(--font-code); background: var(--muted); padding: 0.1em 0.4em; border-radius: var(--radius-sm); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Card, CardHeader, CardTitle, CardDescription, CardAction, CardContent, Badge, Status } = window.SzumTechDesignSystem_1f5ec4;

  function Demo() {
    return (
      <div className="container">
        <div>
          <h1 className="text-heading-h1" style={{ margin: 0 }}>Welcome to your project</h1>
          <p className="lead">This template loads the Vanilla Tailwind Design System and is ready for you to build with.</p>
        </div>

        <Card>
          <CardHeader>
            <CardTitle>Getting started</CardTitle>
            <CardDescription>Replace this content with your own — keep using components from the bundle.</CardDescription>
          </CardHeader>
          <CardContent>
            <ol style={{ margin: 0, paddingLeft: 20, display: "flex", flexDirection: "column", gap: 6, fontSize: 14 }}>
              <li>Replace this content with your design.</li>
              <li>Use components from <code>window.SzumTechDesignSystem_1f5ec4</code>.</li>
              <li>Reference design tokens (<code>var(--primary)</code>, <code>var(--space-4)</code>, …) for anything custom.</li>
              <li>Export your finished mock and share it — it renders identically everywhere.</li>
            </ol>
          </CardContent>
        </Card>

        <Card>
          <CardHeader>
            <CardTitle>Example components</CardTitle>
            <CardAction><Status variant="success">Live</Status></CardAction>
          </CardHeader>
          <CardContent style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Button>Primary button</Button>
            <Button variant="outline">Outline button</Button>
            <Button variant="ghost">Ghost button</Button>
            <Badge variant="success">In stock</Badge>
            <Badge variant="warning">Low stock</Badge>
          </CardContent>
        </Card>

        <Card>
          <CardHeader>
            <CardTitle>Finding more components</CardTitle>
          </CardHeader>
          <CardContent style={{ fontSize: 14, color: "var(--muted-foreground)" }}>
            Browse <code>components/</code> in the design system: <strong>button</strong>, <strong>badge</strong> (Badge, Status),
            <strong> card</strong>, <strong>data-display</strong> (Avatar, Kbd, Separator, Table),
            <strong> feedback</strong> (Alert, Progress, Skeleton, Spinner), <strong>forms</strong> (Input, Label, Checkbox, Switch, Select, Field).
            Each has a <code>.d.ts</code> for props and a <code>.prompt.md</code> for usage.
          </CardContent>
        </Card>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
