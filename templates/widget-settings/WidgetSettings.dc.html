<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
<x-dc>
<!-- @template name="Widget Settings Card" description="A Shopify widget configuration panel built from Szum-Tech components — header, fields, toggles and actions." -->
<helmet>
<script src="./ds-base.js"></script>
<style>
.stage{min-height:100vh;background:var(--muted);display:flex;align-items:flex-start;justify-content:center;padding:48px 24px;font-family:var(--font-poppins);color:var(--foreground)}
.panel{width:520px;max-width:100%}
.field{display:grid;gap:6px}
.lbl{font-size:14px;font-weight:500}
.hint{margin:0;font-size:13px;color:var(--muted-foreground)}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:16px}
.toggle .t{font-size:14px;font-weight:500}
.toggle .d{font-size:12px;color:var(--muted-foreground)}
.stack{display:flex;flex-direction:column;gap:18px}
.foot{display:flex;gap:10px;justify-content:flex-end;width:100%}
</style>
</helmet>
<div class="stage"><div class="panel"><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Card" hint-size="520px,auto"><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardHeader" hint-size="100%,auto"><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardTitle" hint-size="auto,auto">Free Shipping Bar</x-import><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardDescription" hint-size="auto,auto">Motivate shoppers to reach the free-shipping threshold.</x-import><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardAction" hint-size="auto,auto"><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Status" variant="success" hint-size="auto,auto">Live</x-import></x-import></x-import><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardContent" hint-size="100%,auto"><div class="stack"><div class="field"><label class="lbl" for="msg">Message</label><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Input" id="msg" default-value="Free shipping on orders over $75" hint-size="100%,32px"></x-import></div><div class="field"><label class="lbl" for="thr">Threshold</label><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Input" id="thr" default-value="75" hint-size="100%,32px"></x-import><p class="hint">Order subtotal required to unlock free shipping.</p></div><div class="field"><label class="lbl" for="pl">Placement</label><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Select" id="pl" hint-size="100%,32px"><option value="top">Top announcement bar</option><option value="cart">Cart drawer</option><option value="product">Product page</option></x-import></div><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Separator" hint-size="100%,1px"></x-import><div class="toggle"><div><div class="t">Show on storefront</div><div class="d">Publish immediately after saving.</div></div><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Switch" checked="{{ true }}" hint-size="32px,18px"></x-import></div></div></x-import><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.CardFooter" hint-size="100%,auto"><div class="foot"><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Button" variant="ghost" hint-size="auto,32px">Cancel</x-import><x-import component-from-global-scope="SzumTechDesignSystem_1f5ec4.Button" hint-size="auto,32px">Save changes</x-import></div></x-import></x-import></div></div>
</x-dc>
