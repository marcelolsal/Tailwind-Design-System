<!-- @dsCard group="Components" viewport="700x300" name="Feedback" subtitle="Alert, Progress, Spinner & Skeleton" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .col { display: flex; flex-direction: column; gap: 16px; max-width: 560px; }
  .row { display: flex; align-items: center; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const S = window.VanillaTailwindDesignSystem_1f5ec4;
  const { Alert, AlertTitle, AlertDescription, Progress, Spinner, Skeleton } = S;
  const Info = (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>);
  function Demo() {
    return (
      <div className="col">
        <Alert>
          <Info />
          <AlertTitle>Widget saved</AlertTitle>
          <AlertDescription>Your changes are live on the storefront.</AlertDescription>
        </Alert>
        <Alert variant="destructive">
          <Info />
          <AlertTitle>Sync failed</AlertTitle>
          <AlertDescription>Reconnect your Shopify store to continue.</AlertDescription>
        </Alert>
        <div className="row"><Progress value={64} /><span style={{ fontSize: 13, color: "var(--muted-foreground)" }}>64%</span></div>
        <div className="row"><Spinner /><span style={{ fontSize: 14 }}>Loading products…</span></div>
        <div className="row">
          <Skeleton style={{ width: 40, height: 40, borderRadius: 8 }} />
          <div style={{ display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
            <Skeleton style={{ width: "60%", height: 12 }} />
            <Skeleton style={{ width: "40%", height: 12 }} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
