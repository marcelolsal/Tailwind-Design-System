<!-- @dsCard group="Components" viewport="700x300" name="Data display" subtitle="Table, Avatar, Separator & Kbd" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); }
  .col { display: flex; flex-direction: column; gap: 16px; max-width: 620px; }
  .row { display: flex; align-items: center; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const S = window.VanillaTailwindDesignSystem_1f5ec4;
  const { Table, TableHeader, TableBody, TableRow, TableHead, TableCell, Avatar, AvatarFallback, Separator, Kbd, Status } = S;
  function Demo() {
    return (
      <div className="col">
        <Table>
          <TableHeader>
            <TableRow><TableHead>Product</TableHead><TableHead>Stock</TableHead><TableHead>Status</TableHead></TableRow>
          </TableHeader>
          <TableBody>
            <TableRow><TableCell>Ceramic Mug</TableCell><TableCell>128</TableCell><TableCell><Status variant="success">Active</Status></TableCell></TableRow>
            <TableRow><TableCell>Linen Tote</TableCell><TableCell>0</TableCell><TableCell><Status variant="error">Sold out</Status></TableCell></TableRow>
            <TableRow><TableCell>Wax Candle</TableCell><TableCell>42</TableCell><TableCell><Status variant="warning">Low</Status></TableCell></TableRow>
          </TableBody>
        </Table>
        <div className="row">
          <Avatar><AvatarFallback>JS</AvatarFallback></Avatar>
          <Avatar><AvatarFallback>MK</AvatarFallback></Avatar>
          <Separator orientation="vertical" style={{ height: 24 }} />
          <span style={{ fontSize: 14, color: "var(--muted-foreground)" }}>Save with</span>
          <Kbd>⌘</Kbd><Kbd>S</Kbd>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
