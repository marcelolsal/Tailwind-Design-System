<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-poppins); color: var(--foreground); }
  .item { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; }
  .tag { width: 130px; flex-shrink: 0; font-size: 11px; color: var(--muted-foreground); font-family: var(--font-code); }
</style>
</head>
<body>
<div class="item"><span class="tag">.text-display-xl</span><span class="text-display-xl">Storefront</span></div>
<div class="item"><span class="tag">.text-display-lg</span><span class="text-display-lg">Storefront</span></div>
<div class="item"><span class="tag">.text-display-md</span><span class="text-display-md">Storefront</span></div>
<div class="item"><span class="tag">.text-display-sm</span><span class="text-display-sm">Storefront</span></div>
</body>
</html>
