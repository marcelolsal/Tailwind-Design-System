<!-- @dsCard group="Colors" viewport="700x150" name="Dark theme" subtitle="Add .dark to any ancestor to flip tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; font-family: var(--font-poppins); }
  .dark { background: var(--background); color: var(--foreground); padding: 20px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .chip { width: 96px; height: 52px; border-radius: var(--radius); border: 1px solid var(--border); }
  .cap { font-size: 12px; color: var(--muted-foreground); font-family: var(--font-code); margin-top: 6px; }
  .sw { text-align: center; }
</style>
</head>
<body>
<div class="dark">
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="cap">--card</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="cap">--primary</div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="cap">--muted</div></div>
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="cap">--success</div></div>
    <div class="sw"><div class="chip" style="background:var(--error)"></div><div class="cap">--error</div></div>
    <div style="margin-left:8px"><div style="font-weight:600">Dark mode</div><div style="font-size:12px;color:var(--muted-foreground)">Same tokens, remapped on <code style="font-family:var(--font-code)">.dark</code></div></div>
  </div>
</div>
</body>
</html>
