<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Background, card & foreground pairing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--muted); font-family: var(--font-poppins); }
  .row { display: flex; gap: 16px; }
  .surface { flex: 1; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; box-shadow: var(--shadow-sm); }
  .t { font-weight: 600; font-size: 14px; }
  .s { font-size: 12px; color: var(--muted-foreground); margin-top: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="surface" style="background:var(--background);color:var(--foreground)"><div class="t">--background</div><div class="s">Page surface · --foreground text</div></div>
  <div class="surface" style="background:var(--card);color:var(--card-foreground)"><div class="t">--card</div><div class="s">Raised surface · shadow-sm</div></div>
</div>
</body>
</html>
