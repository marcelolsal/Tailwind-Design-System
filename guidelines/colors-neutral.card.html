<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Secondary, muted, accent & lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-poppins); }
  .swatches { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 122px; }
  .chip { height: 56px; border-radius: var(--radius); border: 1px solid var(--border); }
  .name { font-size: 12px; font-weight: 600; color: var(--foreground); margin-top: 8px; }
  .val { font-size: 11px; color: var(--muted-foreground); font-family: var(--font-code); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="name">--secondary</div></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">--muted</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">--accent</div></div>
  <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><div class="name">--muted-foreground</div></div>
  <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">--border</div></div>
</div>
</body>
</html>
